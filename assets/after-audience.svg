<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#F0FDF4"/>

  <text x="60" y="55" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#0D9488" letter-spacing="0.15em">AFTER RIGHTAUDIENCE</text>
  <text x="60" y="90" font-family="Instrument Serif, Georgia, serif" font-size="28" fill="#18181B">One segment, all-in</text>

  <rect x="60" y="115" width="320" height="350" rx="16" fill="white" stroke="#4ADE80" stroke-width="2"/>
  <rect x="80" y="133" width="80" height="22" rx="6" fill="#F0FDF4"/>
  <text x="90" y="148" font-family="DM Sans, sans-serif" font-size="10" font-weight="600" fill="#0D9488">FOCUSED</text>
  <text x="80" y="190" font-family="Instrument Serif, Georgia, serif" font-size="18" fill="#10B981">"Bootstrapped SaaS founders"</text>
  <text x="80" y="212" font-family="DM Sans, sans-serif" font-size="13" fill="#71717A">87% purchase intent — clear #1</text>
  <line x1="80" y1="230" x2="360" y2="230" stroke="#F0FDF4" stroke-width="1"/>
  <text x="80" y="257" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ 2 of 4 low-fit segments deprioritised</text>
  <text x="80" y="280" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ 6x close rate when focused on top 2</text>
  <text x="80" y="303" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ 87% purchase intent from top segment</text>
  <text x="80" y="326" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ Outreach now laser-targeted</text>
  <rect x="80" y="390" width="280" height="44" rx="12" fill="url(#greenGradAud)"/>
  <text x="130" y="417" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="white">Go all-in on the right segment</text>
  <defs>
    <linearGradient id="greenGradAud" x1="80" y1="390" x2="360" y2="434">
      <stop stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- Card 1 -->
  <rect x="420" y="110" width="320" height="110" rx="14" fill="white" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="440" y="142" font-family="DM Sans, sans-serif" font-size="11" fill="#0D9488" letter-spacing="0.1em">TOP SEGMENT INTENT</text>
  <text x="440" y="183" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#10B981">87%</text>
  <text x="512" y="183" font-family="DM Sans, sans-serif" font-size="12" fill="#71717A">purchase intent score</text>

  <!-- Card 2 -->
  <rect x="420" y="235" width="320" height="110" rx="14" fill="white" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="440" y="267" font-family="DM Sans, sans-serif" font-size="11" fill="#0D9488" letter-spacing="0.1em">CLOSE RATE IMPROVEMENT</text>
  <text x="440" y="308" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#10B981">6x</text>
  <text x="492" y="308" font-family="DM Sans, sans-serif" font-size="12" fill="#71717A">focused vs. broad</text>

  <!-- Card 3 -->
  <rect x="420" y="360" width="320" height="110" rx="14" fill="white" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="440" y="392" font-family="DM Sans, sans-serif" font-size="11" fill="#0D9488" letter-spacing="0.1em">SEGMENTS ELIMINATED</text>
  <text x="440" y="433" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#18181B">2 of 4</text>
  <text x="572" y="433" font-family="DM Sans, sans-serif" font-size="12" fill="#71717A">deprioritised</text>
</svg>

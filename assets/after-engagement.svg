<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#F0FDF4"/>

  <text x="60" y="55" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#0D9488" letter-spacing="0.15em">AFTER RIGHTENGAGEMENT</text>

  <text x="80" y="205" font-family="DM Sans, sans-serif" font-size="12" fill="#10B981">72% of personas flagged it as a template</text>
  <line x1="80" y1="223" x2="360" y2="223" stroke="#F0FDF4" stroke-width="1"/>
  <text x="80" y="248" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ Reply rate: 18% (original message)</text>
  <text x="80" y="271" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ Projected: 34% with suggested rewrite</text>
  <text x="80" y="294" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ Rewrite provided with full reasoning</text>
  <text x="80" y="317" font-family="DM Sans, sans-serif" font-size="13" fill="#10B981">↳ Open rate: 61% — hook is working</text>
  <rect x="80" y="390" width="280" height="44" rx="12" fill="url(#greenGradEng)"/>
  <text x="120" y="417" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="white">Send with confidence</text>
  <defs>
    <linearGradient id="greenGradEng" x1="80" y1="390" x2="360" y2="434">
      <stop stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- Card 1 -->
  <rect x="420" y="110" width="320" height="110" rx="14" fill="white" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="440" y="142" font-family="DM Sans, sans-serif" font-size="11" fill="#0D9488" letter-spacing="0.1em">PROJECTED REPLY RATE</text>
  <text x="440" y="183" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#10B981">34%</text>
  <text x="512" y="183" font-family="DM Sans, sans-serif" font-size="12" fill="#71717A">up from 18% (+89%)</text>

  <!-- Card 2 -->
  <rect x="420" y="235" width="320" height="110" rx="14" fill="white" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="440" y="267" font-family="DM Sans, sans-serif" font-size="11" fill="#0D9488" letter-spacing="0.1em">KILLER LINE DETECTED</text>
  <text x="440" y="295" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#10B981">"noticed you just launched"</text>
  <text x="440" y="315" font-family="DM Sans, sans-serif" font-size="12" fill="#71717A">72% flagged — rewrite provided</text>

  <!-- Card 3 -->
  <rect x="420" y="360" width="320" height="110" rx="14" fill="white" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="440" y="392" font-family="DM Sans, sans-serif" font-size="11" fill="#0D9488" letter-spacing="0.1em">OPEN RATE</text>
  <text x="440" y="433" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#18181B">61%</text>
  <text x="492" y="433" font-family="DM Sans, sans-serif" font-size="12" fill="#71717A">hook is landing</text>

  <rect x="60" y="115" width="320" height="350" rx="16" fill="white" stroke="#4ADE80" stroke-width="2"/>
  <rect x="80" y="133" width="100" height="22" rx="6" fill="#F0FDF4"/>
  <text x="90" y="148" font-family="DM Sans, sans-serif" font-size="10" font-weight="600" fill="#0D9488">SIMULATED</text>

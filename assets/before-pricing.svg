<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#FFF5F5"/>

  <text x="60" y="55" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#EF4444" letter-spacing="0.15em">BEFORE</text>
  <text x="60" y="90" font-family="Instrument Serif, Georgia, serif" font-size="28" fill="#18181B">You're charging too little</text>

  <rect x="60" y="120" width="320" height="340" rx="16" fill="white" stroke="#FCA5A5" stroke-width="1.5"/>

  <text x="80" y="155" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">YOUR PRICE</text>
  <text x="80" y="205" font-family="DM Mono, monospace" font-size="52" font-weight="500" fill="#EF4444">$29</text>
  <text x="220" y="205" font-family="DM Sans, sans-serif" font-size="18" fill="#A3A3A3">/mo</text>

  <text x="80" y="235" font-family="DM Sans, sans-serif" font-size="12" fill="#D4D4D8">"Felt right. No one actually tested it."</text>

  <line x1="80" y1="255" x2="360" y2="255" stroke="#F4F4F5" stroke-width="1"/>

  <text x="80" y="285" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">Buyers willing to pay more — you don't know</text>
  <text x="80" y="310" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">Leaving $20/mo per customer on the table</text>
  <text x="80" y="335" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">$240/yr x 1,000 customers = $240k lost</text>
  <text x="80" y="360" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">Attracting the wrong customers</text>

  <rect x="80" y="390" width="280" height="44" rx="12" fill="#F4F4F5"/>
  <text x="155" y="417" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#A3A3A3">Hope for the best</text>

  <rect x="420" y="120" width="320" height="100" rx="14" fill="white" stroke="#FCA5A5" stroke-width="1"/>
  <text x="440" y="155" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">CONFIDENCE</text>
  <text x="440" y="195" font-family="DM Mono, monospace" font-size="36" font-weight="500" fill="#EF4444">0%</text>
  <text x="510" y="195" font-family="DM Sans, sans-serif" font-size="14" fill="#A3A3A3">just a guess</text>

  <rect x="420" y="240" width="320" height="100" rx="14" fill="white" stroke="#FCA5A5" stroke-width="1"/>
  <text x="440" y="275" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">MONEY LEFT ON THE TABLE</text>
  <text x="440" y="315" font-family="DM Mono, monospace" font-size="36" font-weight="500" fill="#EF4444">$240k</text>
  <text x="560" y="315" font-family="DM Sans, sans-serif" font-size="14" fill="#A3A3A3">/year</text>

  <rect x="420" y="360" width="320" height="100" rx="14" fill="white" stroke="#FCA5A5" stroke-width="1"/>
  <text x="440" y="395" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">BUYERS ASKED</text>
  <text x="440" y="435" font-family="DM Mono, monospace" font-size="36" font-weight="500" fill="#18181B">0</text>
  <text x="475" y="435" font-family="DM Sans, sans-serif" font-size="14" fill="#A3A3A3">maybe 3 friends</text>
</svg>

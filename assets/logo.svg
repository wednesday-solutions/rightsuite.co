<svg width="80" height="80" viewBox="-8 -8 80 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <!-- Top shine: bright white strip across upper third, like the button -->
    <linearGradient id="shine" x1="32" y1="4" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.28"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#16a34a" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Base shape with drop shadow -->
  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#grad)" filter="url(#shadow)"/>
  <!-- Top shine overlay -->
  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#shine)"/>

  <!-- Checkmark drop shadow -->
  <path
    d="M21.5 33.5L28.5 40.5L42.5 23.5"
    stroke="rgba(0,0,0,0.18)"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(0.5, 1)"
  />
  <!-- Checkmark -->
  <path
    d="M21.5 33.5L28.5 40.5L42.5 23.5"
    stroke="white"
    stroke-width="4.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>

<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="24" fill="#FFF5F5"/>

  <text x="60" y="55" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#EF4444" letter-spacing="0.15em">BEFORE</text>
  <text x="60" y="90" font-family="Instrument Serif, Georgia, serif" font-size="28" fill="#18181B">Launching blind</text>

  <rect x="60" y="115" width="320" height="350" rx="16" fill="white" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="80" y="150" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">YOUR GO-TO-MARKET</text>
  <text x="80" y="185" font-family="Instrument Serif, Georgia, serif" font-size="17" fill="#EF4444">"We picked the price, wrote</text>
  <text x="80" y="208" font-family="Instrument Serif, Georgia, serif" font-size="17" fill="#EF4444">the page, and launched."</text>
  <line x1="80" y1="228" x2="360" y2="228" stroke="#F4F4F5" stroke-width="1"/>
  <text x="80" y="255" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">↳ Price too low — wrong customers attracted</text>
  <text x="80" y="278" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">↳ ICP too broad — no message resonated</text>
  <text x="80" y="301" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">↳ Homepage copy didn't convert anyone</text>
  <text x="80" y="324" font-family="DM Sans, sans-serif" font-size="13" fill="#EF4444">↳ $80k in runway burned before first pivot</text>
  <rect x="80" y="390" width="280" height="44" rx="12" fill="#F4F4F5"/>
  <text x="150" y="417" font-family="DM Sans, sans-serif" font-size="13" font-weight="600" fill="#A3A3A3">Learn the hard way</text>

  <!-- Card 1 -->
  <rect x="420" y="110" width="320" height="110" rx="14" fill="white" stroke="#FCA5A5" stroke-width="1"/>
  <text x="440" y="142" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">RUNWAY BURNED</text>
  <text x="440" y="183" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#EF4444">$80k</text>
  <text x="532" y="183" font-family="DM Sans, sans-serif" font-size="12" fill="#A3A3A3">on unvalidated assumptions</text>

  <!-- Card 2 -->
  <rect x="420" y="235" width="320" height="110" rx="14" fill="white" stroke="#FCA5A5" stroke-width="1"/>
  <text x="440" y="267" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">DECISIONS VALIDATED</text>
  <text x="440" y="308" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#EF4444">0</text>
  <text x="464" y="308" font-family="DM Sans, sans-serif" font-size="12" fill="#A3A3A3">everything was a guess</text>

  <!-- Card 3 -->
  <rect x="420" y="360" width="320" height="110" rx="14" fill="white" stroke="#FCA5A5" stroke-width="1"/>
  <text x="440" y="392" font-family="DM Sans, sans-serif" font-size="11" fill="#A3A3A3" letter-spacing="0.1em">MONTHS TO FIRST PIVOT</text>
  <text x="440" y="433" font-family="DM Mono, monospace" font-size="34" font-weight="500" fill="#18181B">6</text>
  <text x="464" y="433" font-family="DM Sans, sans-serif" font-size="12" fill="#A3A3A3">too late to course-correct</text>
</svg>

title: Right Suite Docs
description: GTM validation platform — prompts, templates, playbooks, and product guides for founders who need to sell what they built.
url: https://wednesday-solutions.github.io
baseurl: /rightsuite.co

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _sass
